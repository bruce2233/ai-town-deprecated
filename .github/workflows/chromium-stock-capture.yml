name: chromium-stock-capture

on:
  push:
    paths:
      - '.github/workflows/chromium-stock-capture.yml'
      - 'experiments/chromium_capture_ci/**'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install websocket-client

      - name: Run stock Chrome capture
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          python experiments/chromium_capture_ci/scripts/capture_real_stock_chrome.py \
            --manifest experiments/chromium_capture_ci/manifests/two_cases_file_html.json \
            --chrome-binary "$CHROME_BIN" \
            --output-dir artifacts/stock_capture

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-stock-capture
          path: artifacts/stock_capture/
          if-no-files-found: error
